[tuning]
max_iterations = 1000
seeds = [42, 100, 2026]
objective = "map_stable_ranges"
allowed_parameters = [
    "estimates.joint_count_estimate",
    "estimates.joint_upkeep_cost",
    "estimates.resource_regeneration_or_inflow",
    "cell.mandatory_cost_per_tick",
    "resources.passive_energy_income_placeholder"
]

[tuning.ranges]
"estimates.joint_count_estimate" = [0.0, 4.0, 2.0]
"estimates.joint_upkeep_cost" = [0.0, 4.0, 2.0]
"estimates.resource_regeneration_or_inflow" = [2.0, 10.0, 4.0]
"cell.mandatory_cost_per_tick" = [1.0, 5.0, 2.0]
"resources.passive_energy_income_placeholder" = [2.0, 8.0, 3.0]
